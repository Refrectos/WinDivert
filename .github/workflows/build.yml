name: Build WinDivert
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-i686-gcc

      - name: Build
        shell: msys2 {0}
        run: bash mingw-build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windivert-build
          path: |
            install/MINGW/**/*.exe
            install/MINGW/**/*.dll
            install/MINGW/**/*.lib
